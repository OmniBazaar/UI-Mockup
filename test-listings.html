<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBazaar - Test Listing Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #373373;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .status {
            text-align: center;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
        }
        
        .status.loading {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .info {
            background: #e0e7ff;
            color: #3730a3;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #f7f8fa;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #373373;
        }
        
        .stat-label {
            color: #6f727f;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .listing-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .listing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .listing-images {
            position: relative;
            height: 200px;
            background: #f3f4f6;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .listing-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;  /* Better for product images */
            object-position: center;
            display: none;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }
        
        .listing-images img.active {
            display: block;
        }
        
        .image-dots {
            position: absolute;
            bottom: 0.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.25rem;
        }
        
        .image-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        
        .image-dot.active {
            background: white;
        }
        
        .listing-content {
            padding: 1rem;
        }
        
        .listing-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .listing-description {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .listing-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid #f3f4f6;
        }
        
        .listing-price {
            font-size: 1.25rem;
            font-weight: bold;
            color: #373373;
        }
        
        .listing-location {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: #6b7280;
            font-size: 0.85rem;
        }
        
        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #e0e7ff;
            color: #3730a3;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .actions {
            text-align: center;
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        button {
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: #373373;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2a2a5e;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 OmniBazaar Listing Integration Test</h1>
        
        <div class="info">
            ℹ️ This page tests the listing generation and image processing systems.
            Images are fetched from Unsplash and processed to fit without distortion.
        </div>
        
        <div id="status" class="status loading">
            Checking listings...
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="total-count">0</div>
                <div class="stat-label">Total Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="with-images">0</div>
                <div class="stat-label">With Images</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="categories-count">0</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="countries-count">0</div>
                <div class="stat-label">Countries</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-primary" onclick="alert('To initialize listings, open the developer console and run the initialization script')">
                Initialize 200 Listings
            </button>
            <button class="btn-secondary" onclick="loadListings()">
                Refresh Display
            </button>
            <button class="btn-danger" onclick="clearListings()">
                Clear All Listings
            </button>
        </div>
        
        <div id="listings" class="listings-grid"></div>
    </div>
    
    <script>
        // Simple version for testing without module imports
        
        function loadListings() {
            const listingsJson = localStorage.getItem('omnibazaar_listings');
            const statusEl = document.getElementById('status');
            const listingsEl = document.getElementById('listings');
            const statsEl = document.getElementById('stats');
            
            if (!listingsJson) {
                statusEl.className = 'status error';
                statusEl.textContent = 'No listings found. Please run the Bazaar app to generate test data.';
                listingsEl.innerHTML = '';
                statsEl.style.display = 'none';
                return;
            }
            
            const listings = JSON.parse(listingsJson);
            
            // Update stats
            document.getElementById('total-count').textContent = listings.length;
            document.getElementById('with-images').textContent = listings.filter(l => l.images && l.images.length > 0).length;
            
            // Count unique categories
            const categories = new Set(listings.map(l => l.category));
            document.getElementById('categories-count').textContent = categories.size;
            
            // Count unique countries
            const countries = new Set(listings.map(l => l.location?.country).filter(Boolean));
            document.getElementById('countries-count').textContent = countries.size;
            
            statsEl.style.display = 'grid';
            
            statusEl.className = 'status success';
            statusEl.textContent = `✅ Loaded ${listings.length} listings from storage`;
            
            // Display first 20 listings
            const displayListings = listings.slice(0, 20);
            listingsEl.innerHTML = displayListings.map(listing => createListingCard(listing)).join('');
            
            // Add image carousel functionality (DISABLED FOR NOW)
            // setTimeout(() => {
            //     document.querySelectorAll('.listing-images').forEach(container => {
            //         const images = container.querySelectorAll('img');
            //         const dots = container.querySelectorAll('.image-dot');
            //         let currentIndex = 0;
            //         
            //         if (images.length > 1) {
            //             setInterval(() => {
            //                 images[currentIndex].classList.remove('active');
            //                 dots[currentIndex]?.classList.remove('active');
            //                 currentIndex = (currentIndex + 1) % images.length;
            //                 images[currentIndex].classList.add('active');
            //                 dots[currentIndex]?.classList.add('active');
            //             }, 3000);
            //         }
            //     });
            // }, 100);
        }
        
        function createListingCard(listing) {
            const categoryNames = {
                1: 'Products',
                2: 'Services', 
                3: 'Art/NFT',
                4: 'Gaming',
                5: 'Crypto'
            };
            
            const categoryColors = {
                1: 'background: #dbeafe; color: #1e40af;',
                2: 'background: #fce7f3; color: #a21caf;',
                3: 'background: #e9d5ff; color: #7c3aed;',
                4: 'background: #d1fae5; color: #047857;',
                5: 'background: #fef3c7; color: #b45309;'
            };
            
            const price = (parseFloat(listing.price) / 1e18).toFixed(2);
            const images = listing.images || [];
            
            return `
                <div class="listing-card">
                    <div class="listing-images">
                        ${images.length > 0 ? images.map((img, i) => {
                            // Handle both full URLs and relative paths
                            const imageUrl = img.startsWith('http') ? img : img;
                            return `
                                <img src="${imageUrl}" 
                                     alt="${listing.title}" 
                                     class="${i === 0 ? 'active' : ''}" 
                                     loading="lazy"
                                     crossorigin="anonymous"
                                     onerror="this.onerror=null; this.src='https://via.placeholder.com/280x200/667eea/ffffff?text=${encodeURIComponent(listing.title.substring(0, 15))}'">
                            `;
                        }).join('') : `
                            <img src="https://via.placeholder.com/280x200/764ba2/ffffff?text=No+Image" alt="No image" class="active">
                        `}
                        ${images.length > 1 ? `
                            <div class="image-dots">
                                ${images.map((_, i) => `
                                    <div class="image-dot ${i === 0 ? 'active' : ''}"></div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="listing-content">
                        <div class="category-badge" style="${categoryColors[listing.category]}">
                            ${categoryNames[listing.category] || 'Other'}
                        </div>
                        <h3 class="listing-title">${listing.title}</h3>
                        <p class="listing-description">${listing.description}</p>
                        <div class="listing-meta">
                            <span class="listing-price">${price} XOM</span>
                            <span class="listing-location">
                                📍 ${listing.location?.city}, ${listing.location?.country}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function clearListings() {
            if (confirm('Are you sure you want to clear all listings?')) {
                localStorage.removeItem('omnibazaar_listings');
                localStorage.removeItem('omnibazaar_listings_initialized');
                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = '🗑️ All listings cleared';
                document.getElementById('listings').innerHTML = '';
                document.getElementById('stats').style.display = 'none';
            }
        }
        
        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadListings();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OmniBazaar</title>
    <link rel="stylesheet" href="omnibazaar-theme.css">
    <link rel="stylesheet" href="template-styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-container {
            background: var(--surface);
            border-radius: 1.2rem;
            box-shadow: var(--shadow-lg);
            max-width: 48rem;
            width: 100%;
            padding: 4rem;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .brand-header img {
            width: 6rem;
            height: 6rem;
            margin-bottom: 1.5rem;
        }

        .brand-header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .brand-header p {
            color: var(--text-secondary);
            font-size: 1.4rem;
        }

        .tab-navigation {
            display: flex;
            margin-bottom: 3rem;
            background: var(--hover);
            border-radius: 0.8rem;
            padding: 0.4rem;
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            border: none;
            background: transparent;
            border-radius: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
        }

        .tab-button.active {
            background: var(--surface);
            color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.4rem;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 1.6rem;
            border: 2px solid var(--border);
            border-radius: 0.8rem;
            font-size: 1.4rem;
            transition: all 0.2s;
            background: var(--surface);
            color: var(--text-primary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(55, 51, 115, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-secondary);
            font-size: 1.4rem;
        }

        .checkbox-label input {
            width: 1.8rem;
            height: 1.8rem;
        }

        .link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }

        .submit-button {
            width: 100%;
            padding: 1.4rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }

        .submit-button:hover {
            background: var(--primary-dark);
            transform: translateY(-0.2rem);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 1.5rem;
            color: var(--text-secondary);
            font-size: 1.3rem;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 0.8rem;
            background: var(--surface);
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .social-button:hover {
            background: var(--hover);
            border-color: var(--primary-color);
        }

        .signup-prompt {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.3rem;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        /* Tab content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2.4rem;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="login-container">
            <a href="index.html" class="back-link">
                ← Back to Marketplace
            </a>

            <div class="brand-header">
                <img src="OmniBazaar Globe-clear-256x256.png" alt="OmniBazaar">
                <h1>Welcome to OmniBazaar</h1>
                <p>Your decentralized marketplace</p>
            </div>

            <div class="tab-navigation">
                <button class="tab-button active" onclick="switchTab('login')">Login</button>
                <button class="tab-button" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="email">Email or Username</label>
                        <input type="text" id="email" class="form-input" placeholder="Enter your email or username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div class="remember-forgot">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            Remember me
                        </label>
                        <a href="#" class="link">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-button">Login</button>
                </form>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-buttons">
                    <button class="social-button">
                        <span>🔷</span> MetaMask
                    </button>
                    <button class="social-button">
                        <span>🔗</span> WalletConnect
                    </button>
                </div>

                <p class="signup-prompt">
                    Don't have an account? <a href="#" class="link" onclick="switchTab('signup')">Sign up</a>
                </p>
            </div>

            <!-- Sign Up Tab -->
            <div id="signup-tab" class="tab-content">
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label" for="signup-username">Username</label>
                        <input type="text" id="signup-username" class="form-input" placeholder="Choose a username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signup-email">Email</label>
                        <input type="email" id="signup-email" class="form-input" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signup-password">Password</label>
                        <input type="password" id="signup-password" class="form-input" placeholder="Create a password" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" class="form-input" placeholder="Confirm your password" required>
                    </div>

                    <div class="remember-forgot">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            I agree to the <a href="terms.html" class="link">Terms</a> and <a href="privacy.html" class="link">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="submit-button">Create Account</button>
                </form>

                <div class="divider">
                    <span>Or sign up with</span>
                </div>

                <div class="social-buttons">
                    <button class="social-button">
                        <span>🔷</span> MetaMask
                    </button>
                    <button class="social-button">
                        <span>🔗</span> WalletConnect
                    </button>
                </div>

                <p class="signup-prompt">
                    Already have an account? <a href="#" class="link" onclick="switchTab('login')">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Update buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tab + '-tab').classList.add('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            // In a real app, this would authenticate with the backend
            window.location.href = 'index.html';
        }

        function handleSignup(event) {
            event.preventDefault();
            // In a real app, this would create an account
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBazaar - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 1.6rem;
            line-height: 1.5;
            color: #3E4153;
            background-color: #F7F8FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            border-radius: 0.8rem;
            box-shadow: 0 0.2rem 0.5rem rgba(0, 0, 0, 0.1);
            padding: 3.2rem;
            width: 100%;
            max-width: 48rem;
            border: 0.1rem solid #D2D3D7;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 3.2rem;
        }

        .logo {
            width: 6.4rem;
            height: 6.4rem;
            margin-bottom: 1.6rem;
        }

        .brand-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #3E4153;
            margin-bottom: 0.8rem;
        }

        .brand-subtitle {
            color: #6F727F;
            font-size: 1.6rem;
        }

        .tab-navigation {
            display: flex;
            margin-bottom: 3.2rem;
            background: #F7F8FA;
            border-radius: 0.8rem;
            padding: 0.4rem;
        }

        .tab-button {
            flex: 1;
            padding: 1.2rem;
            border: none;
            background: transparent;
            border-radius: 0.6rem;
            font-weight: 500;
            color: #6F727F;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.6rem;
        }

        .tab-button.active {
            background: white;
            color: #373373;
            box-shadow: 0 0.2rem 0.4rem rgba(0, 0, 0, 0.1);
            font-weight: 700;
        }

        .auth-form {
            margin-bottom: 2.4rem;
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 700;
            color: #3E4153;
            margin-bottom: 2.4rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #3E4153;
            margin-bottom: 0.6rem;
            font-size: 1.4rem;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 1.6rem;
            border: 0.1rem solid #D2D3D7;
            border-radius: 0.8rem;
            font-size: 1.6rem;
            transition: border-color 0.2s;
            background: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: #373373;
            box-shadow: 0 0 0 0.3rem rgba(55, 51, 115, 0.1);
        }

        .form-input.error {
            border-color: #DC2626;
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            padding: 0.4rem;
            font-size: 1.6rem;
        }

        .password-strength {
            margin-top: 0.8rem;
            display: none;
        }

        .strength-bar {
            height: 0.4rem;
            background: #E5E5E5;
            border-radius: 0.2rem;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s;
            width: 0%;
        }

        .strength-fill.weak { background: #DC2626; }
        .strength-fill.medium { background: #F8AA17; }
        .strength-fill.strong { background: #2D844C; }

        .strength-text {
            font-size: 1.2rem;
            color: #6F727F;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin-bottom: 2.4rem;
        }

        .checkbox {
            margin-top: 0.2rem;
            width: 1.6rem;
            height: 1.6rem;
            accent-color: #373373;
        }

        .checkbox-label {
            font-size: 1.4rem;
            color: #6F727F;
            line-height: 1.4;
        }

        .submit-button {
            width: 100%;
            padding: 1.4rem;
            background: #373373;
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .submit-button:hover:not(:disabled) {
            background: #4B4881;
            transform: translateY(-0.1rem);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-links {
            text-align: center;
            margin-top: 1.6rem;
        }

        .link {
            color: #373373;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #DC2626;
            font-size: 1.4rem;
            margin-top: 0.4rem;
            display: none;
        }

        .success-message {
            color: #2D844C;
            font-size: 1.4rem;
            margin-top: 0.4rem;
            display: none;
        }

        .message {
            padding: 1.2rem;
            border-radius: 0.8rem;
            margin-bottom: 1.6rem;
            text-align: center;
            display: none;
            font-size: 1.4rem;
        }

        .message.error {
            background: #FEF2F2;
            color: #DC2626;
            border: 0.1rem solid #FECACA;
        }

        .message.success {
            background: #F0FDF4;
            color: #2D844C;
            border: 0.1rem solid #BBF7D0;
        }

        .navigation-links {
            text-align: center;
            margin-top: 2.4rem;
            padding-top: 2.4rem;
            border-top: 0.1rem solid #E5E5E5;
        }

        .nav-link {
            color: #373373;
            text-decoration: none;
            margin: 0 1.2rem;
            font-size: 1.4rem;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo and Branding -->
        <div class="brand-header">
            <img src="OmniBazaar Globe-clear-256x256.png" alt="OmniBazaar" class="logo" />
            <h1 class="brand-title">Welcome to OmniBazaar</h1>
            <p class="brand-subtitle">Your global network of marketplaces</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-button active" onclick="showTab('login')">
                Sign In
            </button>
            <button class="tab-button" onclick="showTab('register')">
                Create Account
            </button>
        </div>

        <!-- Error/Success Messages -->
        <div id="errorMessage" class="message error"></div>
        <div id="successMessage" class="message success"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <h2 class="form-title">Sign In to Your Account</h2>
            
            <div class="form-group">
                <label for="login-username" class="form-label">Username</label>
                <input
                    id="login-username"
                    type="text"
                    class="form-input"
                    placeholder="Enter your username"
                    required
                />
            </div>

            <div class="form-group">
                <label for="login-password" class="form-label">Password</label>
                <div class="password-input-wrapper">
                    <input
                        id="login-password"
                        type="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                    />
                    <button type="button" class="password-toggle" onclick="togglePassword('login-password')">
                        👁️
                    </button>
                </div>
            </div>

            <button type="submit" class="submit-button">
                Sign In
            </button>

            <div class="form-links">
                <a href="#" class="link" onclick="showForgotPassword()">
                    Forgot your password?
                </a>
            </div>
        </form>

        <!-- Registration Form -->
        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <h2 class="form-title">Create Your Account</h2>
            
            <div class="form-group">
                <label for="register-username" class="form-label">Choose Username</label>
                <input
                    id="register-username"
                    type="text"
                    class="form-input"
                    placeholder="Choose a unique username"
                    oninput="checkUsernameAvailability(this.value)"
                    required
                />
                <div id="usernameError" class="error-message"></div>
                <div id="usernameSuccess" class="success-message"></div>
            </div>

            <div class="form-group">
                <label for="register-password" class="form-label">Create Password</label>
                <div class="password-input-wrapper">
                    <input
                        id="register-password"
                        type="password"
                        class="form-input"
                        placeholder="Create a strong password"
                        oninput="validatePassword(this.value)"
                        required
                    />
                    <button type="button" class="password-toggle" onclick="togglePassword('register-password')">
                        👁️
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <span id="strengthText" class="strength-text"></span>
                </div>
                <div id="passwordError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input
                    id="confirm-password"
                    type="password"
                    class="form-input"
                    placeholder="Confirm your password"
                    oninput="validateConfirmPassword(this.value)"
                    required
                />
                <div id="confirmPasswordError" class="error-message"></div>
            </div>

            <div class="terms-checkbox">
                <input
                    id="terms"
                    type="checkbox"
                    class="checkbox"
                    required
                />
                <label for="terms" class="checkbox-label">
                    I agree to the <a href="#" class="link">Terms of Service</a> and 
                    <a href="#" class="link">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="submit-button" id="registerButton" disabled>
                Create Account
            </button>
        </form>

        <!-- Navigation Links -->
        <div class="navigation-links">
            <a href="index.html" class="nav-link">← Back to Home</a>
            <a href="wallet-dashboard.html" class="nav-link">Dashboard</a>
            <a href="marketplace-home.html" class="nav-link">Marketplace</a>
        </div>
    </div>

    <script>
        let currentTab = 'login';
        let usernameAvailable = false;
        let passwordValid = false;
        let confirmPasswordValid = false;

        function showTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update forms
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(tab + 'Form').classList.add('active');
            
            currentTab = tab;
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        function checkUsernameAvailability(username) {
            const errorDiv = document.getElementById('usernameError');
            const successDiv = document.getElementById('usernameSuccess');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!username) {
                usernameAvailable = false;
                updateRegisterButton();
                return;
            }

            if (username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                errorDiv.style.display = 'block';
                usernameAvailable = false;
                updateRegisterButton();
                return;
            }

            if (username.length > 20) {
                errorDiv.textContent = 'Username must be less than 20 characters';
                errorDiv.style.display = 'block';
                usernameAvailable = false;
                updateRegisterButton();
                return;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                errorDiv.textContent = 'Username can only contain letters, numbers, hyphens, and underscores';
                errorDiv.style.display = 'block';
                usernameAvailable = false;
                updateRegisterButton();
                return;
            }

            // Simulate availability check
            successDiv.textContent = '✓ Username available';
            successDiv.style.display = 'block';
            usernameAvailable = true;
            updateRegisterButton();
        }

        function validatePassword(password) {
            const strengthDiv = document.querySelector('.password-strength');
            const fillDiv = document.getElementById('strengthFill');
            const textDiv = document.getElementById('strengthText');
            const errorDiv = document.getElementById('passwordError');
            
            errorDiv.style.display = 'none';

            if (!password) {
                strengthDiv.style.display = 'none';
                passwordValid = false;
                updateRegisterButton();
                return;
            }

            strengthDiv.style.display = 'block';

            let score = 0;
            let feedback = [];

            if (password.length >= 12) score += 25;
            else feedback.push('at least 12 characters');

            if (/[A-Z]/.test(password)) score += 25;
            else feedback.push('uppercase letter');

            if (/[a-z]/.test(password)) score += 25;
            else feedback.push('lowercase letter');

            if (/[\d\W]/.test(password)) score += 25;
            else feedback.push('number or symbol');

            fillDiv.style.width = score + '%';
            
            if (score < 50) {
                fillDiv.className = 'strength-fill weak';
                textDiv.textContent = `Weak - Add ${feedback.join(', ')}`;
                passwordValid = false;
            } else if (score < 75) {
                fillDiv.className = 'strength-fill medium';
                textDiv.textContent = 'Good - ' + (feedback.length > 0 ? `Add ${feedback.join(', ')}` : 'Strong password');
                passwordValid = score >= 75;
            } else {
                fillDiv.className = 'strength-fill strong';
                textDiv.textContent = 'Strong password ✓';
                passwordValid = true;
            }

            updateRegisterButton();
        }

        function validateConfirmPassword(confirmPassword) {
            const password = document.getElementById('register-password').value;
            const errorDiv = document.getElementById('confirmPasswordError');
            
            errorDiv.style.display = 'none';

            if (!confirmPassword) {
                confirmPasswordValid = false;
                updateRegisterButton();
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                confirmPasswordValid = false;
            } else {
                confirmPasswordValid = true;
            }

            updateRegisterButton();
        }

        function updateRegisterButton() {
            const button = document.getElementById('registerButton');
            const terms = document.getElementById('terms').checked;
            
            button.disabled = !(usernameAvailable && passwordValid && confirmPasswordValid && terms);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            // Simulate login
            showMessage('success', `Welcome back, ${username}! Redirecting to dashboard...`);
            
            setTimeout(() => {
                window.location.href = 'wallet-dashboard.html';
            }, 2000);
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('register-username').value;
            
            // Simulate registration
            showMessage('success', `Account created successfully! Welcome, ${username}!`);
            
            setTimeout(() => {
                window.location.href = 'wallet-dashboard.html';
            }, 2000);
        }

        function showMessage(type, message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        function showForgotPassword() {
            alert('Password recovery: Please contact support with your username for account recovery.');
        }

        // Update terms checkbox listener
        document.getElementById('terms').addEventListener('change', updateRegisterButton);
    </script>
</body>
</html>
